
name: CI

on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: install Bandit
        run: pip install bandit
      - name: Run Bandit Scan
        run: bandit -r .
